name: Blog Build - Layer Advisory

on:
  schedule:
    - cron: '0 7 * * 2'
    - cron: '0 7 * * 5'
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of posts to generate'
        required: false
        default: '2'

jobs:
  build-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic pillow

      - name: Check queue and refill if needed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          QUEUE_LENGTH=$(python3 -c "
          import json, pathlib
          q = json.loads(pathlib.Path('aqe_queue.json').read_text()) if pathlib.Path('aqe_queue.json').exists() else {'queue': []}
          print(len(q.get('queue', [])))
          " 2>/dev/null || echo "0")
          echo "Current queue length: $QUEUE_LENGTH"
          if [ "$QUEUE_LENGTH" -lt "10" ]; then
            echo "Queue low - refilling..."
            python3 las_aqe_pipeline.py --generate --count 20
          fi

      - name: Generate blog posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          COUNT="${{ github.event.inputs.count || '2' }}"
          python3 las_blog_build.py --from-queue --count $COUNT

      - name: Commit and push
        run: |
          git config --global user.name "Layer Advisory Bot"
          git config --global user.email "bot@layeradvisory.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto: publish $(date +'%Y-%m-%d') blog posts"
          git push
