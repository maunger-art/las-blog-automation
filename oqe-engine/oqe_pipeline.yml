name: OQE Pipeline - Layer Advisory

on:
  schedule:
    # Run every Saturday at 5:00 AM UTC (before Sunday AQE refresh)
    - cron: '0 5 * * 6'
  workflow_dispatch:
    inputs:
      sources:
        description: 'Sources to run (space-separated: reddit google_paa indie_hackers)'
        required: false
        default: 'reddit google_paa indie_hackers'
      dry_run:
        description: 'Dry run (true/false)'
        required: false
        default: 'false'

jobs:
  run-oqe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run OQE pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          SOURCES="${{ github.event.inputs.sources || 'reddit google_paa indie_hackers' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          if [ "$DRY_RUN" = "true" ]; then
            python3 run_oqe.py --sources $SOURCES --dry-run
          else
            python3 run_oqe.py --sources $SOURCES
          fi

      - name: Show queue status
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 run_oqe.py --status

      - name: Commit updated queues
        run: |
          git config --global user.name "Layer Advisory Bot"
          git config --global user.email "bot@layeradvisory.com"
          git add aqe_queue.json oqe/queue/question_queue.json oqe/queue/archive/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "OQE: harvest $(date +'%Y-%m-%d') questions"
          git push
